<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="stylo.css">
    <link rel="stylesheet" href="media-query.css">
    <title>Login</title>
</head>
<body>
    <main>
        <section>
            <div class="imagem">
                <img id="img" src="img/theanandthakur-building-6011756_640.jpg" alt="Predio">
            </div>
            <div class="tela-log">
                <h1 class="log">Login</h1>
                <p>Seja muito bem vindo a tela de login.</p>
                <form action="php.com">
                    <label class="log" for="iusu">E-mail</label>
                <input class="caixa" type="email" name="iusu" id="iusu" required minlength="10"max-length="20"size="30" placeholder="seu@email.com" autocomplete="username">
                 <label class="log" for="isenha">Senha</label>
                 <input class="caixa" type="password" name="isenha" id="isenha" required minlength="10" maxlength="20" size="30" placeholder="******" autocomplete="senha">
                 <input class="butão" type="submit" value="Entrar">
                 <a class="esqui" href="#"> 🔓Esqueci a senha</a>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
